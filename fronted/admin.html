<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель | Стрелковый интенсив</title>
    <link rel="icon" type="image/jpeg" href="https://32b76580-04bc-45a6-83c4-37b3a03f1877.selstorage.ru/production-timeweb/images/0bfff022-2028-4973-bf77-b4bf99ad4743.jpg" />
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        :root {
            --text: #e8e4e0;
            --text-soft: #d0ccc8;
            --gold: #c4a060;
            --purple: #9b8af0;
            --purple-hover: #8a78e0;
            --bg: #1A1C20;
            --card-bg: rgba(60, 56, 52, 0.78);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg);
            background-image: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 80%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width:1100px; margin:0 auto; padding:20px; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:2px solid var(--purple); }
        .header h1 { font-size:1.8rem; }
        .header h1 span { color:var(--purple); }
        .tabs { display:flex; gap:10px; margin:20px 0; flex-wrap:wrap; }
        .tab { background:var(--card-bg); color:var(--text-soft); padding:10px 24px; border-radius:8px; cursor:pointer; border:1px solid var(--card-border); transition:0.3s; font-weight:600; }
        .tab.active { background:var(--purple); color:#fff; border-color:var(--purple); }
        .tab:hover:not(.active) { border-color:var(--purple); }
        .content { display:none; }
        .content.active { display:block; }
        .card { background:var(--card-bg); padding:20px; border-radius:12px; border:1px solid var(--card-border); margin-bottom:20px; }
        .btn { background:var(--purple); color:#fff; padding:10px 24px; border:none; border-radius:6px; cursor:pointer; font-weight:600; transition:0.3s; }
        .btn:hover { background:var(--purple-hover); }
        .btn.secondary { background:transparent; border:1px solid var(--card-border); color:var(--text); }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; margin-bottom:5px; color:var(--text-soft); font-size:0.85rem; }
        .form-group input, .form-group select { width:100%; padding:10px; background:var(--input-bg); color:var(--text); border:1px solid var(--input-border); border-radius:6px; font-size:0.95rem; }
        .form-group select option { background:#1A1C20; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        @media (max-width:700px) { .form-row { grid-template-columns:1fr; } .header h1 { font-size:1.2rem; } .tabs { gap:5px; } .tab { padding:8px 14px; font-size:0.8rem; } }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>🔧 Админ-панель <span>«Стрелковый интенсив»</span></h1>
            <button class="btn secondary" onclick="logout()">Выйти</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('dates')">📅 Даты</button>
            <button class="tab" onclick="switchTab('clients')">👥 Клиенты</button>
            <button class="tab" onclick="switchTab('prices')">💰 Цены</button>
            <button class="tab" onclick="switchTab('gallery')">🖼️ Галерея</button>
            <button class="tab" onclick="switchTab('mailing')">📨 Рассылка</button>
            <button class="tab" onclick="switchTab('report')">📊 Отчёт</button>
            <button class="tab" onclick="switchTab('calendar')">📅 Календарь</button>
        </div>

        <!-- Вкладка: Даты -->
        <div id="tab-dates" class="content active">
            <div class="card">
                <h4>➕ Добавить дату занятия</h4>
                <div class="form-row">
                    <div class="form-group"><label>Дата</label><input type="date" id="new-date" /></div>
                    <div class="form-group"><label>Название (например, "Базовый-2")</label><input type="text" id="new-date-label" placeholder="Базовый-2" /></div>
                </div>
                <div class="form-group">
                    <label>Для какого тарифа эта дата?</label>
                    <select id="new-date-tariff">
                        <option value="all">Любой тариф</option>
                        <option value="basic">Только Базовый</option>
                        <option value="practice">Только Практика</option>
                        <option value="pro">Только Расширенная практика</option>
                    </select>
                </div>
                <button class="btn" onclick="addNewDate()">Добавить дату</button>
            </div>
            <div id="dates-list"></div>
        </div>

        <!-- Вкладка: Клиенты -->
        <div id="tab-clients" class="content">
            <div class="card">
                <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                    <input type="text" id="client-search" placeholder="🔍 Поиск..." oninput="renderClients()" style="flex:1;padding:10px;background:var(--input-bg);color:var(--text);border:1px solid var(--input-border);border-radius:6px;min-width:150px;" />
                    <button class="btn secondary" onclick="clientsFilter='all';renderClients();">👥 Все</button>
                    <button class="btn secondary" onclick="clientsFilter='experienced';renderClients();">⭐ Опытные</button>
                    <button class="btn secondary" onclick="clientsFilter='beginners';renderClients();">🔰 Новички</button>
                    <button class="btn secondary" onclick="clientsFilter='pro';renderClients();">🏆 Про</button>
                    <button class="btn secondary" onclick="clientsFilter='referrals';renderClients();">👫 По приглашениям</button>
                </div>
            </div>
            <div id="admin-clients-list"></div>
        </div>

        <!-- Вкладка: Цены -->
        <div id="tab-prices" class="content">
            <div class="card">
                <h4>💰 Настройка цен</h4>
                <div class="form-row">
                    <div class="form-group"><label>Базовый (патроны)</label><input type="number" id="price-basic-base" /></div>
                    <div class="form-group"><label>Базовый (инструктор)</label><input type="number" id="price-basic-instructor" /></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Практика (патроны)</label><input type="number" id="price-practice-base" /></div>
                    <div class="form-group"><label>Практика (инструктор)</label><input type="number" id="price-practice-instructor" /></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Продвинутый (патроны)</label><input type="number" id="price-pro-base" /></div>
                    <div class="form-group"><label>Продвинутый (инструктор)</label><input type="number" id="price-pro-instructor" /></div>
                </div>
                <button class="btn" onclick="savePrices()">Сохранить цены</button>
            </div>
        </div>

        <!-- Вкладка: Галерея -->
        <div id="tab-gallery" class="content">
            <div class="card">
                <h4>📤 Загрузить фото/видео</h4>
                <input type="file" id="gallery-upload" accept="image/*,video/*" multiple onchange="uploadGalleryFiles(this)" style="width:100%;padding:10px;background:var(--input-bg);color:var(--text);border:1px solid var(--input-border);border-radius:6px;" />
                <p style="font-size:0.7rem;opacity:0.5;margin-top:5px;">Макс. 20 файлов</p>
            </div>
            <div id="gallery-list"></div>
        </div>

        <!-- Вкладка: Рассылка -->
        <div id="tab-mailing" class="content">
            <div class="card">
                <h4>📨 Рассылка</h4>
                <p style="font-size:0.75rem;opacity:0.6;margin-bottom:8px;">Отправить сообщение всем согласившимся.</p>
                <div class="form-group">
                    <label>Текст сообщения</label>
                    <textarea id="mailing-message" rows="4" style="width:100%;padding:10px;background:var(--input-bg);color:var(--text);border:1px solid var(--input-border);border-radius:6px;font-family:inherit;font-size:0.9rem;">Новый набор на «Стрелковый интенсив»! Подробности на сайте.</textarea>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button onclick="sendMailing('vk')" class="btn">📤 VK</button>
                    <button onclick="sendMailing('telegram')" class="btn secondary">📤 Telegram</button>
                </div>
                <div id="mailing-result" style="margin-top:10px;font-size:0.85rem;color:var(--text-soft);"></div>
            </div>
        </div>

        <!-- Вкладка: Отчёт -->
        <div id="tab-report" class="content">
            <div class="card">
                <h4>📊 Записи по датам и клиентам</h4>
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                        <thead>
                            <tr style="background:var(--card-border); color:var(--text);">
                                <th style="padding:8px; text-align:left;">Дата</th>
                                <th style="padding:8px; text-align:left;">Клиент</th>
                                <th style="padding:8px; text-align:left;">Телефон</th>
                                <th style="padding:8px; text-align:left;">Тариф</th>
                                <th style="padding:8px; text-align:left;">Время</th>
                                <th style="padding:8px; text-align:left;">Итог</th>
                            </tr>
                        </thead>
                        <tbody id="report-body">
                            <tr><td colspan="6" style="text-align:center; padding:20px; opacity:0.5;">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Вкладка: Календарь -->
        <div id="tab-calendar" class="content">
            <div class="card">
                <h4>📅 Календарь занятий</h4>
                <div id="calendar-container" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:8px; margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== Пароль (потом поменяем) =====
        const ADMIN_PASS = '777';
        let clientsFilter = 'all';

        // ===== API =====
        const API_BASE = 'https://shooting-course.onrender.com';

        async function apiFetch(url) {
            if (!API_BASE) throw new Error('API_BASE не задана');
            try {
                const res = await fetch(API_BASE + url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            } catch (err) {
                console.error('Ошибка API:', err);
                throw err;
            }
        }

        async function apiPost(url, data) {
            if (!API_BASE) throw new Error('API_BASE не задана');
            try {
                const res = await fetch(API_BASE + url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            } catch (err) {
                console.error('Ошибка API:', err);
                throw err;
            }
        }

        // ===== Вход =====
        function checkAuth() {
            const pw = prompt('🔐 Введите пароль администратора:');
            if (pw !== ADMIN_PASS) {
                alert('❌ Неверный пароль');
                window.location.href = '/';
                return false;
            }
            return true;
        }

        if (!checkAuth()) {
            // если не прошёл — редирект
        }

        // ===== Вкладки =====
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            const tabElement = document.querySelector(`.tab[onclick*="'${tab}'"]`);
            if (tabElement) tabElement.classList.add('active');
            const contentElement = document.getElementById(`tab-${tab}`);
            if (contentElement) contentElement.classList.add('active');
            
            if (tab === 'clients') renderClients();
            if (tab === 'dates') renderDates();
            if (tab === 'gallery') renderGallery();
            if (tab === 'report') renderReport();
            if (tab === 'calendar') renderCalendar();
        }

        // ===== Выход =====
        function logout() {
            if (confirm('Выйти из админ-панели?')) {
                window.location.href = '/';
            }
        }

        // ===== Даты =====
        let allDates = [];

        async function loadDates() {
            try {
                const config = await apiFetch('/api/config');
                allDates = config.dates || [];
                renderDates();
            } catch (err) {
                document.getElementById('dates-list').innerHTML = `<p style="opacity:0.5; color:#c44;">⚠️ Ошибка загрузки: ${err.message}</p>`;
            }
        }

        function renderDates() {
            const container = document.getElementById('dates-list');
            if (!allDates.length) {
                container.innerHTML = '<p style="opacity:0.4;">Нет добавленных дат</p>';
                return;
            }
            container.innerHTML = allDates.map(d => `
                <div class="card" style="padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
                    <div>
                        <strong>${d.label}</strong>
                        <span style="opacity:0.4;font-size:0.85rem;">${d.value}</span>
                        <span style="background:var(--card-border);padding:2px 10px;border-radius:4px;font-size:0.7rem;margin-left:8px;">
                            ${d.group === 'basic' ? 'Базовый' :
                              d.group === 'practice' ? 'Практика' :
                              d.group === 'pro' ? 'Расширенная практика' :
                              'Любой'}
                        </span>
                        <span style="margin-left:8px; font-size:0.7rem; color:var(--gold);">
                            👥 ${d.currentCount || 0}/${d.maxPersons || 10}
                        </span>
                    </div>
                    <button onclick="deleteDate('${d.id}')" class="btn secondary" style="padding:4px 12px;font-size:0.7rem;">🗑 Удалить</button>
                </div>
            `).join('');
        }

        async function addNewDate() {
            const value = document.getElementById('new-date').value;
            const labelInput = document.getElementById('new-date-label').value.trim();
            const tariff = document.getElementById('new-date-tariff').value;
            
            if (!value) { alert('Выберите дату!'); return; }
            
            let finalLabel;
            if (labelInput) {
                finalLabel = labelInput;
            } else {
                const dateObj = new Date(value + 'T00:00:00');
                const day = dateObj.getDate();
                const month = dateObj.toLocaleString('ru-RU', { month: 'long' });
                const year = dateObj.getFullYear();
                finalLabel = `${day} ${month} ${year}`;
            }
            
            try {
                const data = { value, label: finalLabel, group_id: tariff, time_slot: 'full' };
                await apiPost('/api/dates', data);
                loadDates();
                document.getElementById('new-date').value = '';
                document.getElementById('new-date-label').value = '';
            } catch (err) {
                alert('❌ Ошибка при добавлении даты: ' + err.message);
            }
        }

        async function deleteDate(id) {
            if (!confirm('Удалить это занятие?')) return;
            try {
                const res = await fetch(API_BASE + '/api/dates/' + encodeURIComponent(id), {
                    method: 'DELETE'
                });
                if (res.ok) {
                    loadDates();
                } else {
                    alert('❌ Ошибка при удалении занятия');
                }
            } catch (err) {
                alert('❌ Ошибка сети: ' + err.message);
            }
        }

        // ===== Клиенты =====
        async function renderClients() {
            const container = document.getElementById('admin-clients-list');
            try {
                const clients = await apiFetch('/api/clients');
                const bookings = await apiFetch('/api/bookings');
                const q = document.getElementById('client-search').value.toLowerCase();
                
                let filtered = clients;
                if (q) filtered = filtered.filter(c => c.phone.includes(q) || c.name.toLowerCase().includes(q) || c.surname.toLowerCase().includes(q));
                if (clientsFilter === 'experienced') filtered = filtered.filter(c => c.experienced === 'experienced');
                if (clientsFilter === 'beginners') filtered = filtered.filter(c => c.experienced === 'newbie');
                if (clientsFilter === 'pro') filtered = filtered.filter(c => c.experienced === 'pro');
                if (clientsFilter === 'referrals') filtered = filtered.filter(c => c.referrer);
                
                if (!filtered.length) {
                    container.innerHTML = '<p style="opacity:0.4;">Ничего не найдено</p>';
                    return;
                }
                
                container.innerHTML = filtered.map(c => {
                    const userBookings = bookings.filter(b => b.phone === c.phone);
                    return `
                    <div class="card" style="padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
                        <div>
                            <strong style="color:var(--purple);">${c.surname} ${c.name}</strong>
                            <span style="opacity:0.4;">${c.phone}</span>
                            <br><span style="font-size:0.7rem;opacity:0.4;">Занятий: ${c.visits}</span>
                            ${c.experienced === 'pro' ? ' <span style="background:var(--gold);color:#1A1C20;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:600;">🏆 Про</span>' :
                              c.experienced === 'experienced' ? ' <span style="background:var(--purple);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:600;">⭐ Опытный</span>' :
                              ' <span style="background:#444;color:#aaa;padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:600;">🔰 Новичок</span>'}
                            ${c.referrer ? `<div style="font-size:0.6rem;opacity:0.5;margin-top:4px;">👤 Привёл: ${c.referrer}</div>` : ''}
                            ${userBookings.length ? `<div style="font-size:0.7rem;opacity:0.4;margin-top:4px;">📅 ${userBookings.map(b => b.date + ' — ' + b.tariff).join('<br>')}</div>` : ''}
                        </div>
                        <div>
                            <button onclick="deleteClient('${c.phone}')" class="btn secondary" style="width:auto;padding:4px 12px;font-size:0.6rem;">🗑 Удалить</button>
                        </div>
                    </div>
                `}).join('');
            } catch (err) {
                container.innerHTML = `<p style="opacity:0.5; color:#c44;">⚠️ Ошибка загрузки клиентов: ${err.message}</p>`;
            }
        }

        async function deleteClient(phone) {
            if (!confirm(`Удалить клиента ${phone}? Это удалит все его данные.`)) return;
            try {
                const res = await fetch(API_BASE + '/api/clients/' + encodeURIComponent(phone), {
                    method: 'DELETE'
                });
                if (res.ok) {
                    renderClients();
                } else {
                    alert('❌ Ошибка при удалении клиента');
                }
            } catch (err) {
                alert('❌ Ошибка сети: ' + err.message);
            }
        }

        // ===== Цены =====
        let tariffPrices = {};

        async function loadPrices() {
            try {
                const config = await apiFetch('/api/config');
                tariffPrices = config.prices || {};
                document.getElementById('price-basic-base').value = tariffPrices.basic?.base || 5000;
                document.getElementById('price-basic-instructor').value = tariffPrices.basic?.instructor || 3500;
                document.getElementById('price-practice-base').value = tariffPrices.practice?.base || 5000;
                document.getElementById('price-practice-instructor').value = tariffPrices.practice?.instructor || 2000;
                document.getElementById('price-pro-base').value = tariffPrices.pro?.base || 10000;
                document.getElementById('price-pro-instructor').value = tariffPrices.pro?.instructor || 3500;
            } catch (err) {
                document.getElementById('tab-prices').innerHTML = `<p style="opacity:0.5; color:#c44;">⚠️ Ошибка загрузки цен: ${err.message}</p>`;
            }
        }

        async function savePrices() {
            const practiceBase = parseInt(document.getElementById('price-practice-base').value);
            const practiceInstructor = parseInt(document.getElementById('price-practice-instructor').value);
            const basicBase = parseInt(document.getElementById('price-basic-base').value);
            const basicInstructor = parseInt(document.getElementById('price-basic-instructor').value);
            const proBase = parseInt(document.getElementById('price-pro-base').value);
            const proInstructor = parseInt(document.getElementById('price-pro-instructor').value);
            
            if (isNaN(practiceBase) || isNaN(practiceInstructor) || 
                isNaN(basicBase) || isNaN(basicInstructor) || 
                isNaN(proBase) || isNaN(proInstructor)) {
                alert('Введите корректные числа!');
                return;
            }
            if (practiceBase < 0 || practiceInstructor < 0 || 
                basicBase < 0 || basicInstructor < 0 || 
                proBase < 0 || proInstructor < 0) {
                alert('Цены не могут быть отрицательными!');
                return;
            }
            
            try {
                const res = await fetch(API_BASE + '/api/prices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        practice: { base: practiceBase, instructor: practiceInstructor },
                        basic: { base: basicBase, instructor: basicInstructor },
                        pro: { base: proBase, instructor: proInstructor }
                    })
                });
                if (res.ok) {
                    alert('✅ Цены сохранены!');
                    loadPrices();
                } else {
                    alert('❌ Ошибка при сохранении');
                }
            } catch (err) {
                alert('❌ Ошибка сети: ' + err.message);
            }
        }

        // ===== Галерея =====
        let galleryFiles = [];

        function loadGallery() {
            try {
                const s = localStorage.getItem('shooting_gallery');
                if (s) galleryFiles = JSON.parse(s);
            } catch(e) {}
            renderGallery();
        }

        function renderGallery() {
            const c = document.getElementById('gallery-list');
            if (!galleryFiles.length) {
                c.innerHTML = '<p style="opacity:0.4;">Нет файлов</p>';
                return;
            }
            c.innerHTML = galleryFiles.map((f, i) => `
                <div style="display:flex;justify-content:space-between;padding:6px;font-size:0.7rem;border-bottom:1px solid var(--input-border);">
                    ${f.type === 'video' ? '🎬' : '🖼️'} ${f.name || 'Файл'}
                    <button onclick="deleteGalleryFile(${i})" style="background:none;border:none;color:#c44;cursor:pointer;">✕</button>
                </div>
            `).join('');
        }

        function uploadGalleryFiles(input) {
            Array.from(input.files).forEach(file => {
                if (galleryFiles.length >= 20) {
                    alert('Достигнут лимит в 20 файлов');
                    return;
                }
                const r = new FileReader();
                r.onerror = () => alert(`Ошибка при чтении файла ${file.name}`);
                r.onload = function(e) {
                    galleryFiles.push({ 
                        type: file.type.startsWith('video') ? 'video' : 'image', 
                        data: e.target.result, 
                        name: file.name 
                    });
                    localStorage.setItem('shooting_gallery', JSON.stringify(galleryFiles));
                    renderGallery();
                };
                r.readAsDataURL(file);
            });
            input.value = '';
        }

        function deleteGalleryFile(i) {
            if (confirm('Удалить?')) {
                galleryFiles.splice(i, 1);
                localStorage.setItem('shooting_gallery', JSON.stringify(galleryFiles));
                renderGallery();
            }
        }

        // ===== Рассылка =====
        async function sendMailing(platform) {
            const msg = document.getElementById('mailing-message').value.trim();
            const resultDiv = document.getElementById('mailing-result');
            if (!msg) {
                resultDiv.textContent = '⚠️ Введите текст сообщения';
                return;
            }
            try {
                const clients = await apiFetch('/api/clients');
                const phones = clients
                    .filter(c => c.newsletter && c.phone && c.phone.length >= 10)
                    .map(c => c.phone);
                
                if (!phones.length) {
                    resultDiv.textContent = 'Нет согласившихся на рассылку.';
                    return;
                }
                const encoded = encodeURIComponent(msg);
                const links = phones.map(p => {
                    const clean = p.replace(/\D/g, '');
                    if (platform === 'vk') return `https://vk.com/write?phone=+${clean}`;
                    if (platform === 'telegram') return `https://t.me/msg?phone=+${clean}&text=${encoded}`;
                    return '';
                }).join('\n');
                resultDiv.innerHTML = `
                    <p style="margin-top:8px;">📨 ${phones.length} номеров. Скопируйте ссылки:</p>
                    <textarea rows="5" style="width:100%;background:var(--input-bg);color:var(--text);border:1px solid var(--input-border);border-radius:6px;padding:6px;font-size:0.7rem;" onclick="this.select()">${links}</textarea>
                    <p style="font-size:0.65rem;opacity:0.5;">Открывайте ссылки по одной — они ведут в чат с клиентом.</p>
                `;
            } catch (err) {
                resultDiv.textContent = '❌ Ошибка: ' + err.message;
            }
        }

        // ===== Отчёт =====
        async function renderReport() {
            const container = document.getElementById('report-body');
            if (!container) return;
            try {
                const bookings = await apiFetch('/api/bookings');
                if (!bookings.length) {
                    container.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; opacity:0.5;">Нет записей</td></tr>';
                    return;
                }
                const grouped = {};
                bookings.forEach(b => {
                    if (!grouped[b.date]) grouped[b.date] = [];
                    grouped[b.date].push(b);
                });
                let html = '';
                Object.keys(grouped).sort().forEach(date => {
                    const items = grouped[date];
                    items.forEach((b, index) => {
                        html += `
                            <tr style="${index % 2 === 0 ? 'background:var(--input-bg);' : ''}">
                                <td style="padding:8px;">${date}</td>
                                <td style="padding:8px;">${b.surname} ${b.name}</td>
                                <td style="padding:8px;">${b.phone}</td>
                                <td style="padding:8px;">${b.tariff}</td>
                                <td style="padding:8px;">${b.timeSlot}</td>
                                <td style="padding:8px;">${b.finalPrice} ₽</td>
                            </tr>
                        `;
                    });
                });
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; opacity:0.5; color:#c44;">⚠️ Ошибка загрузки: ${err.message}</td></tr>`;
            }
        }

        // ===== Календарь =====
        async function renderCalendar() {
            const container = document.getElementById('calendar-container');
            if (!container) return;
            try {
                const config = await apiFetch('/api/config');
                const dates = config.dates || [];

                if (!dates.length) {
                    container.innerHTML = '<p style="opacity:0.5;">Нет добавленных дат</p>';
                    return;
                }

                const dateMap = {};
                dates.forEach(d => {
                    dateMap[d.value] = {
                        label: d.label,
                        group: d.group,
                        maxPersons: d.maxPersons,
                        currentCount: d.currentCount || 0
                    };
                });

                const firstDate = new Date(Math.min(...dates.map(d => new Date(d.value))));
                const lastDate = new Date(Math.max(...dates.map(d => new Date(d.value))));
                firstDate.setDate(1);
                lastDate.setDate(1);
                lastDate.setMonth(lastDate.getMonth() + 1);
                lastDate.setDate(0);

                let html = '';
                const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
                
                days.forEach(day => {
                    html += `<div style="text-align:center; font-weight:600; color:var(--gold); font-size:0.8rem;">${day}</div>`;
                });

                const startDay = firstDate.getDay();
                for (let i = 0; i < startDay; i++) {
                    html += `<div style="background:var(--input-bg); border-radius:6px; min-height:60px;"></div>`;
                }

                for (let d = new Date(firstDate); d <= lastDate; d.setDate(d.getDate() + 1)) {
                    const dateStr = d.toISOString().split('T')[0];
                    const info = dateMap[dateStr];
                    
                    if (info) {
                        const color = info.group === 'basic' ? 'var(--gold)' : info.group === 'practice' ? 'var(--purple)' : 'var(--gold)';
                        html += `
                            <div style="background:var(--card-bg); border:1px solid ${color}; border-radius:6px; padding:8px; min-height:60px; position:relative;">
                                <div style="font-size:0.7rem; opacity:0.5;">${d.getDate()}</div>
                                <div style="font-size:0.75rem; font-weight:600; color:${color};">${info.label}</div>
                                <div style="font-size:0.6rem; opacity:0.6; margin-top:4px;">${info.currentCount}/${info.maxPersons}</div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div style="background:var(--input-bg); border-radius:6px; min-height:60px; display:flex; align-items:center; justify-content:center; font-size:0.6rem; opacity:0.3;">
                                ${d.getDate()}
                            </div>
                        `;
                    }
                }

                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p style="opacity:0.5; color:#c44;">⚠️ Ошибка загрузки календаря: ${err.message}</p>`;
            }
        }

        // ===== Инициализация =====
        loadDates();
        loadPrices();
        loadGallery();
        renderClients();
    </script>
</body>
</html>
